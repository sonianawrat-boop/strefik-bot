<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; }

#chat-container {
    max-width: 420px;
    height: 95vh;
    margin: auto;
    display: flex;
    flex-direction: column;
    border: 1px solid #ddd;
}

#chat-header {
    background: #457B9D;
    color: white;
    padding: 15px;
}

#chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #F1FAEE;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg { padding:10px; border-radius:10px; max-width:80%; }
.bot-msg { background:#eee; }
.user-msg { background:#A8DADC; align-self:flex-end; }

#chat-footer { padding:10px; }

.quick-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:5px; }

.quick-btn {
    border:1px solid #457B9D;
    padding:5px 10px;
    border-radius:15px;
    background:white;
    cursor:pointer;
}

.input-row { display:flex; gap:5px; }

#chat-input { flex:1; padding:5px; }
#send-btn { background:#457B9D; color:white; border:none; padding:5px 10px; }

#typing { font-size:12px; color:gray; display:none; }
</style>
</head>

<body>

<div id="chat-container">

<div id="chat-header">Strefik ChatBOT 🤖</div>

<div id="chat-messages">
<div class="msg bot-msg">
Chronimy dane Twojego dziecka jak skarb. 🛡️<br><br>
Cześć! Możesz zapytać o menu, plan dnia, wydarzenia lub płatności.
</div>
</div>

<div id="typing">Strefik pisze...</div>

<div id="chat-footer">

<div class="quick-row">
<button class="quick-btn" onclick="quick('menu')">🍽️ Menu</button>
<button class="quick-btn" onclick="quick('plan dnia')">📅 Plan dnia</button>
<button class="quick-btn" onclick="quick('wydarzenia')">📢 Wydarzenia</button>
<button class="quick-btn" onclick="quick('płatności')">💳 Płatności</button>
</div>

<div class="input-row">
<input id="chat-input" placeholder="Napisz wiadomość...">
<button id="send-btn">Wyślij</button>
</div>

</div>
</div>

<script>
const messages = document.getElementById('chat-messages');
const input = document.getElementById('chat-input');
const typing = document.getElementById('typing');

let waitingForCode = false;

function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = 'msg ' + (type === 'user' ? 'user-msg' : 'bot-msg');
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function botResponse(text) {
    const lower = text.toLowerCase();

    // MENU
    if (lower.includes("menu") || lower.includes("obiad")) {
        return `🍽️ MENU TYGODNIOWE:

Poniedziałek:
🥣 Owsianka
🍲 Pomidorowa + makaron
🍎 Jabłko + biszkopty

Wtorek:
🥣 Kanapki + kakao
🍲 Rosół + kurczak
🍌 Banan + jogurt

Środa:
🥣 Płatki + mleko
🍲 Jarzynowa + ryż
🍓 Truskawki

Czwartek:
🥣 Jajecznica
🍲 Krupnik + kotlet
🍊 Pomarańcza

Piątek:
🥣 Parówki
🍲 Ogórkowa + ryba
🍐 Gruszka`;
    }

    // PLAN DNIA
    if (lower.includes("plan dnia") || lower.includes("zajęcia")) {
        return `📅 PLAN DNIA (8:00–15:00):

08:00 Śniadanie
09:00 Zajęcia dydaktyczne
10:30 Zajęcia sportowe
11:30 Spacer
12:30 Obiad
13:30 Odpoczynek
14:30 Zajęcia dodatkowe`;
    }

    // WYDARZENIA
    if (lower.includes("wydarzenia") || lower.includes("zebranie")) {
        return `📢 WYDARZENIA (miesiąc):

10.05 – Zebranie rodziców
15.05 – Wycieczka
20.05 – Dzień sportu
25.05 – Warsztaty plastyczne`;
    }

    // PŁATNOŚCI
    if (lower.includes("płat")) {
        waitingForCode = true;
        return "Podaj kod klienta 💳";
    }

    // obsługa kodu
    if (waitingForCode && /^\d{3,6}$/.test(lower)) {
        waitingForCode = false;

        if (Math.random() > 0.5) {
            return "Na podstawie podanego kodu: płatności są uregulowane ✅";
        } else {
            const amount = Math.floor(Math.random() * 200 + 50);
            return `Pozostała kwota do zapłaty: ${amount} zł ⚠️`;
        }
    }

    // bezpieczeństwo
    if (lower.includes("dziecko") || lower.includes("dane")) {
        return "Ze względów bezpieczeństwa mogę udostępnić tylko podstawowe informacje.";
    }

    return "Nie rozumiem 🤔 Możesz zapytać o menu, plan dnia, wydarzenia lub płatności.";
}

function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = "";
    typing.style.display = 'block';

    setTimeout(() => {
        typing.style.display = 'none';
        addMsg(botResponse(text), 'bot');
    }, 700);
}

function quick(text) {
    addMsg(text, 'user');
    typing.style.display = 'block';

    setTimeout(() => {
        typing.style.display = 'none';
        addMsg(botResponse(text), 'bot');
    }, 700);
}

document.getElementById('send-btn').onclick = send;
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
