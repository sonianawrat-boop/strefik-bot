<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family: Arial; }

#chat-container {
    max-width: 430px;
    height: 95vh;
    margin: auto;
    display: flex;
    flex-direction: column;
    border: 1px solid #ddd;
}

#chat-header {
    background: #457B9D;
    color: white;
    padding: 15px;
}

#chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #F1FAEE;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg { padding:10px; border-radius:10px; max-width:90%; }
.bot-msg { background:#eee; }
.user-msg { background:#A8DADC; align-self:flex-end; }

#chat-footer { padding:10px; }

.quick-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:5px; }

.quick-btn {
    border:1px solid #457B9D;
    padding:5px 10px;
    border-radius:15px;
    background:white;
    cursor:pointer;
}

.input-row { display:flex; gap:5px; }

#chat-input {
    flex:1;
    padding:5px;
    resize:none;
}

#send-btn {
    background:#457B9D;
    color:white;
    border:none;
    padding:5px 10px;
}

#typing { font-size:12px; color:gray; display:none; }
</style>
</head>

<body>

<div id="chat-container">

<div id="chat-header">Strefik ChatBOT🤖</div>

<div id="chat-messages">
<div class="msg bot-msg">
Chronimy dane Twojego dziecka jak skarb. 🛡️

Wybierz kim jesteś:
Rodzic / Nauczyciel / Admin
</div>
</div>

<div id="typing">Strefik pisze...</div>

<div id="chat-footer">

<div class="quick-row">
<button class="quick-btn" onclick="quick('menu')">🍽️ Menu</button>
<button class="quick-btn" onclick="quick('plan dnia')">📅 Plan dnia</button>
<button class="quick-btn" onclick="quick('wydarzenia')">📢 Wydarzenia</button>
<button class="quick-btn" onclick="quick('płatności')">💳 Płatności</button>
<button class="quick-btn" onclick="quick('logout')">🚪 Wyloguj</button>
</div>

<div class="input-row">
<textarea id="chat-input" rows="2" placeholder="Napisz wiadomość..."></textarea>
<button id="send-btn">Wyślij</button>
</div>

</div>
</div>

<script>
const messages = document.getElementById('chat-messages');
const input = document.getElementById('chat-input');
const typing = document.getElementById('typing');

let userRole = null;
let editMode = null;
let waitingForCode = false;

// dane
let menuData = `🍽️ MENU:
Poniedziałek:
🥣 Owsianka
🍲 Pomidorowa + makaron
🍎 Jabłko + biszkopty

Wtorek:
🥣 Kanapki + kakao
🍲 Rosół + kurczak
🍌 Banan + jogurt

Środa:
🥣 Płatki + mleko
🍲 Jarzynowa + ryż
🍓 Truskawki

Czwartek:
🥣 Jajecznica
🍲 Krupnik + kotlet
🍊 Pomarańcza

Piątek:
🥣 Parówki
🍲 Ogórkowa + ryba
🍐 Gruszka`;

let planData = `📅 PLAN DNIA:
08:00 Śniadanie
09:00 Zajęcia
11:00 Spacer
12:00 Obiad
13:00 Odpoczynek
15:00 Odbiór`;

let eventData = `📢 WYDARZENIA:
10.05 – Zebranie rodziców
15.05 – Wycieczka
20.05 – Dzień sportu
25.05 – Warsztaty plastyczne`;

function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = 'msg ' + (type === 'user' ? 'user-msg' : 'bot-msg');
    div.innerText = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function botResponse(text) {
    const lower = text.toLowerCase();

    // 🔥 LOGOUT (działa zawsze)
    if (lower === "logout") {
        userRole = null;
        editMode = null;
        waitingForCode = false;

        return `Wylogowano ✅

Wybierz kim jesteś:
Rodzic / Nauczyciel / Admin`;
    }

    // WYBÓR ROLI
    if (!userRole) {
        if (lower.includes("rodzic")) {
            userRole = "rodzic";
            return "Tryb: Rodzic 👨‍👩‍👧";
        }
        if (lower.includes("nauczyciel")) {
            userRole = "nauczyciel";
            return "Tryb: Nauczyciel 👩‍🏫 (możesz edytować plan i wydarzenia)";
        }
        if (lower.includes("admin")) {
            userRole = "admin";
            return "Tryb: Admin 🧑‍💼 (możesz edytować menu)";
        }
        return "Wpisz: Rodzic / Nauczyciel / Admin";
    }

    // 🔥 KOMENDY EDYCJI (NAPRAWA BUGA)
    if (lower === "edytuj menu" && userRole === "admin") {
        editMode = "menu";
        return "Wpisz nowe menu:";
    }

    if (lower === "edytuj plan" && userRole === "nauczyciel") {
        editMode = "plan";
        return "Wpisz nowy plan:";
    }

    if (lower === "edytuj wydarzenia" && userRole === "nauczyciel") {
        editMode = "event";
        return "Wpisz nowe wydarzenia:";
    }

    // TRYB EDYCJI
    if (editMode) {
        if (editMode === "menu") {
            menuData = text;
            editMode = null;
            return "Menu zapisane ✅";
        }
        if (editMode === "plan") {
            planData = text;
            editMode = null;
            return "Plan zapisany ✅";
        }
        if (editMode === "event") {
            eventData = text;
            editMode = null;
            return "Wydarzenia zapisane ✅";
        }
    }

    // MENU
    if (lower.includes("menu")) {
        if (userRole === "admin") {
            return menuData + "\n\nNapisz: edytuj menu";
        }
        return menuData;
    }

    // PLAN
    if (lower.includes("plan")) {
        if (userRole === "nauczyciel") {
            return planData + "\n\nNapisz: edytuj plan";
        }
        return planData;
    }

    // WYDARZENIA
    if (lower.includes("wydarzenia")) {
        if (userRole === "nauczyciel") {
            return eventData + "\n\nNapisz: edytuj wydarzenia";
        }
        return eventData;
    }

    // PŁATNOŚCI
    if (lower.includes("płat")) {
        waitingForCode = true;
        return "Podaj kod klienta 💳";
    }

    if (waitingForCode && /^\d{3,6}$/.test(lower)) {
        waitingForCode = false;

        if (Math.random() > 0.5) {
            return "Na podstawie podanego kodu: płatności są uregulowane ✅";
        } else {
            return "Pozostała kwota do zapłaty: 150 zł ⚠️";
        }
    }

    // BEZPIECZEŃSTWO
    if (lower.includes("dziecko") || lower.includes("dane")) {
        return "Ze względów bezpieczeństwa mogę udostępnić tylko podstawowe informacje.";
    }

    return "Nie rozumiem 🤔";
}

function send() {
    const text = input.value.trim();
    if (!text) return;

    addMsg(text, 'user');
    input.value = "";
    typing.style.display = 'block';

    setTimeout(() => {
        typing.style.display = 'none';
        addMsg(botResponse(text), 'bot');
    }, 600);
}

function quick(text) {
    addMsg(text, 'user');
    typing.style.display = 'block';

    setTimeout(() => {
        typing.style.display = 'none';
        addMsg(botResponse(text), 'bot');
    }, 600);
}

// ENTER = WYŚLIJ | SHIFT+ENTER = NOWA LINIA
input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

document.getElementById('send-btn').onclick = send;
</script>

</body>
</html>
